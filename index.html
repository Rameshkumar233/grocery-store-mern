    (function () {
      let redirectPath = sessionStorage.getItem('redirect_path')
      let redirectSearch = sessionStorage.getItem('redirect_search')
      if (redirectPath) {
        sessionStorage.removeItem('redirect_path')
        sessionStorage.removeItem('redirect_search')
        const targetURL = redirectPath + redirectSearch
        window.history.replaceState(null, null, targetURL)
      }
    })()
